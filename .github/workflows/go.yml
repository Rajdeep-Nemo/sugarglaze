name: Pluesi Go CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'
        cache: true

    - name: Check Formatting
      run: if [ -n "$(gofmt -l .)" ]; then echo "Format errors found. Run 'go fmt ./...' locally."; exit 1; fi

    - name: Install Dependencies
      run: go mod download

    - name: Run Tests
      run: go test -v ./...

    - name: Build
      run: go build -v ./cmd/...
