run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:

  disable-all: true
  enable:

    - errcheck   
    - gosimple    
    - govet      
    - staticcheck
    - typecheck   
    - unused     
    - gocritic  
    - gocyclo    
    - revive    
    - gofmt 

issues:
  max-issues-per-linter: 0
  max-same-issues: 0